<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Topps Release Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="montage" aria-hidden="true">
      <div class="tile tile-baseball" style="transform: rotate(-12deg) translateY(30px);">
        <svg viewBox="0 0 64 64" width="52" height="52" fill="none" stroke="#fff" stroke-width="2.5">
          <circle cx="32" cy="32" r="26" fill="rgba(255,255,255,0.14)"/>
          <path d="M14 14 Q32 28 14 50"/>
          <path d="M50 14 Q32 28 50 50"/>
        </svg>
        <span class="tile-label">Baseball</span>
      </div>
      <div class="tile tile-basketball" style="transform: rotate(-6deg) translateY(5px);">
        <svg viewBox="0 0 64 64" width="52" height="52" fill="none" stroke="#fff" stroke-width="2.5">
          <circle cx="32" cy="32" r="26" fill="rgba(255,255,255,0.14)"/>
          <line x1="32" y1="6" x2="32" y2="58"/>
          <line x1="6" y1="32" x2="58" y2="32"/>
          <path d="M10 14 Q32 32 10 50"/>
          <path d="M54 14 Q32 32 54 50"/>
        </svg>
        <span class="tile-label">Basketball</span>
      </div>
      <div class="tile tile-football" style="transform: rotate(-2deg) translateY(-10px);">
        <svg viewBox="0 0 64 64" width="58" height="40" fill="none" stroke="#fff" stroke-width="2.5">
          <ellipse cx="32" cy="32" rx="28" ry="16" fill="rgba(255,255,255,0.22)"/>
          <line x1="14" y1="32" x2="50" y2="32"/>
          <line x1="26" y1="26" x2="26" y2="38"/>
          <line x1="32" y1="24" x2="32" y2="40"/>
          <line x1="38" y1="26" x2="38" y2="38"/>
        </svg>
        <span class="tile-label">Football</span>
      </div>
      <div class="tile tile-mma" style="transform: rotate(3deg) translateY(-10px);">
        <svg viewBox="0 0 64 64" width="52" height="52" fill="none" stroke="#fff" stroke-width="2.5">
          <g transform="rotate(-20 20 32)">
            <ellipse cx="20" cy="26" rx="12" ry="14" fill="rgba(255,255,255,0.14)"/>
            <rect x="12" y="38" width="16" height="14" rx="4" fill="rgba(255,255,255,0.14)"/>
          </g>
          <g transform="rotate(20 44 32)">
            <ellipse cx="44" cy="26" rx="12" ry="14" fill="rgba(255,255,255,0.14)"/>
            <rect x="36" y="38" width="16" height="14" rx="4" fill="rgba(255,255,255,0.14)"/>
          </g>
        </svg>
        <span class="tile-label">MMA</span>
      </div>
      <div class="tile tile-soccer" style="transform: rotate(7deg) translateY(5px);">
        <svg viewBox="0 0 64 64" width="52" height="52" fill="none" stroke="#fff" stroke-width="2.5">
          <circle cx="32" cy="32" r="26" fill="rgba(255,255,255,0.14)"/>
          <polygon points="32,18 40,24 37,34 27,34 24,24" fill="rgba(255,255,255,0.3)"/>
          <line x1="32" y1="18" x2="32" y2="8"/>
          <line x1="40" y1="24" x2="50" y2="18"/>
          <line x1="37" y1="34" x2="44" y2="46"/>
          <line x1="27" y1="34" x2="20" y2="46"/>
          <line x1="24" y1="24" x2="14" y2="18"/>
        </svg>
        <span class="tile-label">Soccer</span>
      </div>
      <div class="tile tile-entertainment" style="transform: rotate(12deg) translateY(30px);">
        <svg viewBox="0 0 64 64" width="52" height="52" fill="none" stroke="#fff" stroke-width="2">
          <polygon points="32,4 38,22 58,20 44,34 50,54 32,42 14,54 20,34 6,20 26,22" fill="rgba(255,255,255,0.2)"/>
        </svg>
        <span class="tile-label">Marvel &amp; Disney</span>
      </div>
    </div>
    <div class="header-scrim"></div>
    <div class="wrap header-content">
      <h1>Topps Release Tracker</h1>
      <p class="tagline">Upcoming Topps trading card releases, organized by date. Sign up to get notified when preorders open.</p>
    </div>
  </header>

  <main class="wrap">
    <div class="controls">
      <label for="sport-filter">Filter by sport</label>
      <select id="sport-filter">
        <option value="all">All sports</option>
      </select>
    </div>

    <div id="status" class="status" hidden></div>
    <div id="releases" class="releases"></div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p id="source-note"></p>
    </div>
  </footer>

  <template id="release-card-template">
    <article class="card">
      <div class="card-header">
        <span class="badge sport-badge"></span>
        <span class="badge format-badge"></span>
      </div>
      <h3 class="card-title"></h3>
      <p class="card-date"></p>
      <p class="card-desc"></p>
      <p class="card-preorder-note"></p>
      <p class="card-count"></p>

      <form class="signup-form">
        <div class="contact-toggle">
          <button type="button" class="toggle-btn active" data-type="email">Email</button>
          <button type="button" class="toggle-btn" data-type="phone">Phone</button>
        </div>
        <div class="signup-row">
          <input type="text" class="contact-input" placeholder="you@example.com" autocomplete="email" />
          <button type="submit" class="notify-btn">Notify Me</button>
        </div>
        <p class="form-message" role="status"></p>
      </form>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
